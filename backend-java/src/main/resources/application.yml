server:
  port: 10086

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/scenic_ai?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# 文件上传目录
scenic:
  upload:
    dir: D:/scenic_uploads

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# Python 后端地址
python:
  backend:
    url: http://localhost:8000

# 日志
logging:
  level:
    com.scenic.ai: debug
